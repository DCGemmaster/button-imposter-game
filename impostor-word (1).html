<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imposter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --card: #1c1c1f;
    --border: #2a2a2e;
    --accent: #e8c547;
    --accent-dim: #c9a92e;
    --red: #e84747;
    --green: #47c98a;
    --text: #f0ede6;
    --muted: #6b6b72;
    --subtle: #3a3a40;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,197,71,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,197,71,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; width: 100%; max-width: 640px; }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 48px 0 36px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }
  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
  }

  /* ── TAB BAR ── */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
  }
  .tab {
    flex: 1;
    padding: 9px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent);
    color: #000;
    font-weight: 500;
  }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── ADMIN FORM ── */
  .section-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .field { margin-bottom: 20px; }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  input[type="text"], textarea {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, textarea:focus {
    border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 60px; }

  .clue-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
  }
  .clue-num {
    width: 28px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    padding-top: 2px;
  }
  .clue-row.impostor .clue-num {
    color: var(--red);
  }
  .clue-row.impostor input {
    border-color: rgba(232,71,71,0.4);
  }
  .impostor-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .impostor-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .impostor-label span { color: var(--red); }

  select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px 28px;
    border: none;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
    font-weight: 500;
    width: 100%;
    margin-top: 8px;
  }
  .btn-primary:hover { background: var(--accent-dim); }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 10px;
    padding: 8px 16px;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  /* ── PLAY VIEW ── */
  .puzzle-header {
    margin-bottom: 28px;
  }
  .puzzle-theme {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .puzzle-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .attempts-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 28px;
  }
  .attempt-pip {
    width: 28px;
    height: 6px;
    border-radius: 3px;
    background: var(--subtle);
    transition: background 0.3s;
  }
  .attempt-pip.used { background: var(--red); }
  .attempt-pip.remaining { background: var(--accent); }

  .clues-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }

  .clue-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 14px;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .clue-card:hover { border-color: var(--accent); transform: translateX(2px); }
  .clue-card.selected {
    border-color: var(--accent);
    background: rgba(232, 197, 71, 0.07);
  }
  .clue-card.correct {
    border-color: var(--green);
    background: rgba(71, 201, 138, 0.08);
    pointer-events: none;
    cursor: default;
  }
  .clue-card.wrong {
    border-color: var(--red);
    background: rgba(232, 71, 71, 0.08);
    animation: shake 0.4s ease;
  }
  .clue-card.revealed-impostor {
    border-color: var(--red);
    background: rgba(232, 71, 71, 0.12);
  }
  .clue-card.revealed-real {
    border-color: var(--green);
    background: rgba(71, 201, 138, 0.08);
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .clue-index {
    font-size: 10px;
    color: var(--muted);
    width: 16px;
    flex-shrink: 0;
  }
  .clue-text {
    font-size: 13px;
    line-height: 1.5;
    flex: 1;
  }
  .clue-badge {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .badge-impostor { background: rgba(232,71,71,0.2); color: var(--red); }
  .badge-real { background: rgba(71,201,138,0.2); color: var(--green); }
  .badge-selected { background: rgba(232,197,71,0.2); color: var(--accent); }

  .guess-btn {
    background: var(--accent);
    color: #000;
    font-weight: 500;
    width: 100%;
    padding: 15px;
  }
  .guess-btn:disabled {
    background: var(--subtle);
    color: var(--muted);
    cursor: not-allowed;
  }
  .guess-btn:not(:disabled):hover { background: var(--accent-dim); }

  /* Result state */
  .result-banner {
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 24px;
    text-align: center;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-banner.win {
    background: rgba(71,201,138,0.1);
    border: 1px solid var(--green);
  }
  .result-banner.lose {
    background: rgba(232,71,71,0.1);
    border: 1px solid var(--red);
  }
  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .result-sub {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .no-puzzle {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .no-puzzle .big { font-size: 2.5rem; margin-bottom: 12px; }
  .no-puzzle p { font-size: 12px; line-height: 1.7; }

  /* ── SHARE LINK ── */
  .share-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-top: 20px;
  }
  .share-box label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    display: block;
    margin-bottom: 10px;
  }
  .share-row {
    display: flex;
    gap: 8px;
  }
  .share-row input {
    flex: 1;
    font-size: 11px;
    padding: 10px 12px;
    color: var(--muted);
  }
  .copy-btn {
    background: var(--subtle);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--text);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 12px 24px;
    border-radius: 6px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Daily Puzzle</div>
    <h1>Im<span>poster</span></h1>
    <div class="subtitle">One clue doesn't belong. Find the imposter.</div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('play')">▶ Play</button>
    <button class="tab" onclick="switchTab('admin')">⚙ Set Puzzle</button>
  </div>

  <!-- ══ PLAY VIEW ══ -->
  <div class="view active" id="view-play">
    <div id="play-content"></div>
  </div>

  <!-- ══ ADMIN VIEW ══ -->
  <div class="view" id="view-admin">

    <!-- Password gate -->
    <div id="pw-gate">
      <div style="text-align:center;padding:40px 20px 28px;">
        <div style="font-size:2rem;margin-bottom:12px;">🔒</div>
        <div style="font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:8px;">Host Access</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:28px;">Enter the password to set a puzzle.</div>
        <div style="display:flex;gap:8px;max-width:300px;margin:0 auto;">
          <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPassword()" style="flex:1;">
          <button class="btn btn-primary" style="width:auto;margin:0;padding:12px 20px;" onclick="checkPassword()">Enter</button>
        </div>
        <div id="pw-error" style="font-size:11px;color:var(--red);margin-top:12px;min-height:16px;"></div>
      </div>
    </div>

    <!-- Actual admin form (hidden until unlocked) -->
    <div id="admin-form" style="display:none;">
    <div class="section-label">Puzzle Setup</div>

    <div class="field">
      <label>Theme / Category Name</label>
      <input type="text" id="admin-theme" placeholder="e.g. Things at a Carnival">
    </div>

    <div class="field">
      <label>Brief description shown to players (optional)</label>
      <textarea id="admin-desc" placeholder="e.g. Four of these belong together. One is an impostor."></textarea>
    </div>

    <div class="divider"></div>

    <div class="section-label">The 5 Clues</div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:16px;line-height:1.6;">Write 5 clues. Mark which one is the IMPOSTOR (the fake / doesn't fit the theme).</p>

    <div class="field">
      <label>Which clue is the impostor?</label>
      <select id="admin-impostor-idx">
        <option value="0">Clue 1</option>
        <option value="1">Clue 2</option>
        <option value="2">Clue 3</option>
        <option value="3">Clue 4</option>
        <option value="4">Clue 5</option>
      </select>
    </div>

    <div id="clue-inputs"></div>

    <div class="divider"></div>

    <button class="btn btn-primary" onclick="generateLink()">Generate Share Link</button>

    <div class="share-box" id="share-box" style="display:none">
      <label>Share this link with friends</label>
      <div class="share-row">
        <input type="text" id="share-link-input" readonly>
        <button class="copy-btn" id="copy-btn" onclick="copyLink()">Copy</button>
      </div>
    </div>

    <div style="margin-top:16px;text-align:center">
      <button class="btn btn-ghost" onclick="loadDemo()">Load demo puzzle</button>
    </div>
  </div> <!-- end admin-form -->
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let puzzle = null;      // { theme, desc, clues:[str x5], impostorIdx }
let gameState = null;   // { attemptsLeft, selectedIdx, done, won }

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  buildClueInputs();
  loadFromURL();
});

function loadFromURL() {
  const params = new URLSearchParams(location.search);
  const data = params.get('p');
  if (data) {
    try {
      puzzle = JSON.parse(atob(data));
      startGame();
    } catch(e) {}
  }
  renderPlay();
}

// ══════════════════════════════════════
//  PASSWORD
// ══════════════════════════════════════
let adminUnlocked = false;

function checkPassword() {
  const val = document.getElementById('pw-input').value;
  if (val === 'cartman') {
    adminUnlocked = true;
    document.getElementById('pw-gate').style.display = 'none';
    document.getElementById('admin-form').style.display = 'block';
    document.getElementById('pw-error').textContent = '';
  } else {
    const err = document.getElementById('pw-error');
    err.textContent = 'Wrong password. Try again.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

// ══════════════════════════════════════
//  TABS
// ══════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (i === 0) === (tab==='play'));
  });
  document.getElementById('view-play').classList.toggle('active', tab==='play');
  document.getElementById('view-admin').classList.toggle('active', tab==='admin');
  // Reset gate if not yet unlocked
  if (tab === 'admin' && !adminUnlocked) {
    document.getElementById('pw-gate').style.display = 'block';
    document.getElementById('admin-form').style.display = 'none';
    setTimeout(() => document.getElementById('pw-input').focus(), 100);
  }
}

// ══════════════════════════════════════
//  ADMIN
// ══════════════════════════════════════
function buildClueInputs() {
  const container = document.getElementById('clue-inputs');
  container.innerHTML = '';
  const impostorIdx = parseInt(document.getElementById('admin-impostor-idx').value);
  for (let i = 0; i < 5; i++) {
    const row = document.createElement('div');
    row.className = 'clue-row' + (i === impostorIdx ? ' impostor' : '');
    row.innerHTML = `
      <div class="clue-num">${i === impostorIdx ? '✗' : (i+1)}</div>
      <textarea id="clue-${i}" placeholder="Clue ${i+1}${i === impostorIdx ? ' — the impostor' : ''}" rows="2"></textarea>
    `;
    container.appendChild(row);
  }
}

document.addEventListener('change', e => {
  if (e.target.id === 'admin-impostor-idx') buildClueInputs();
});

function getAdminValues() {
  const theme = document.getElementById('admin-theme').value.trim();
  const desc = document.getElementById('admin-desc').value.trim();
  const impostorIdx = parseInt(document.getElementById('admin-impostor-idx').value);
  const clues = [];
  for (let i = 0; i < 5; i++) {
    clues.push(document.getElementById(`clue-${i}`).value.trim());
  }
  return { theme, desc, clues, impostorIdx };
}

function generateLink() {
  const data = getAdminValues();
  if (!data.theme) { showToast('Add a theme first'); return; }
  if (data.clues.some(c => !c)) { showToast('Fill in all 5 clues'); return; }

  puzzle = data;
  const encoded = btoa(JSON.stringify(data));
  const url = location.origin + location.pathname + '?p=' + encoded;

  document.getElementById('share-link-input').value = url;
  document.getElementById('share-box').style.display = 'block';
  startGame();
  showToast('Puzzle ready!');
}

function loadDemo() {
  const demo = {
    theme: "Things at a Beach",
    desc: "Four of these are real beach experiences. One is an impostor.",
    impostorIdx: 4,
    clues: [
      "The rhythmic crashing sound waves make as they wash onto the shore",
      "A small crustacean that retreats into spiral shells for protection",
      "A large floating platform anchored offshore for swimmers to rest on",
      "The phenomenon where wet sand temporarily hardens when you step on it",
      "A nocturnal deep-sea fish that produces its own bioluminescent blue light"
    ]
  };
  document.getElementById('admin-theme').value = demo.theme;
  document.getElementById('admin-desc').value = demo.desc;
  document.getElementById('admin-impostor-idx').value = demo.impostorIdx;
  buildClueInputs();
  demo.clues.forEach((c, i) => {
    document.getElementById(`clue-${i}`).value = c;
  });
  generateLink();
  switchTab('play');
}

function copyLink() {
  const val = document.getElementById('share-link-input').value;
  navigator.clipboard.writeText(val).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// ══════════════════════════════════════
//  GAME
// ══════════════════════════════════════
function startGame() {
  // Shuffle clue order for display, tracking original indices
  const order = [0,1,2,3,4].sort(() => Math.random() - 0.5);
  gameState = {
    attemptsLeft: 3,
    selectedIdx: null,       // index in shuffled order
    done: false,
    won: false,
    order                    // shuffled display order (values = original indices)
  };
  renderPlay();
}

function renderPlay() {
  const el = document.getElementById('play-content');

  if (!puzzle || !gameState) {
    el.innerHTML = `
      <div class="no-puzzle">
        <div class="big">🕵️</div>
        <p>No puzzle loaded yet.<br>Go to <strong>Set Puzzle</strong> to create one,<br>or ask the host to share a link.</p>
      </div>`;
    return;
  }

  const { theme, desc, clues, impostorIdx } = puzzle;
  const { attemptsLeft, selectedIdx, done, won, order } = gameState;

  // Attempts pips
  const pips = [0,1,2].map(i =>
    `<div class="attempt-pip ${i < (3-attemptsLeft) ? 'used' : 'remaining'}"></div>`
  ).join('');

  // Clue cards
  const cards = order.map((origIdx, dispIdx) => {
    const text = clues[origIdx];
    const isImpostor = origIdx === impostorIdx;
    let cardClass = 'clue-card';
    let badge = '';

    if (done) {
      cardClass += isImpostor ? ' revealed-impostor' : ' revealed-real';
      badge = isImpostor
        ? `<span class="clue-badge badge-impostor">impostor</span>`
        : `<span class="clue-badge badge-real">real</span>`;
    } else if (dispIdx === selectedIdx) {
      cardClass += ' selected';
      badge = `<span class="clue-badge badge-selected">selected</span>`;
    }

    const clickHandler = done ? '' : `onclick="selectClue(${dispIdx})"`;
    return `
      <div class="${cardClass}" ${clickHandler}>
        <div class="clue-index">${dispIdx+1}</div>
        <div class="clue-text">${text}</div>
        ${badge}
      </div>`;
  }).join('');

  // Result banner
  let resultHTML = '';
  if (done) {
    const attemptsUsed = 3 - attemptsLeft;
    if (won) {
      resultHTML = `
        <div class="result-banner win">
          <div class="result-title">Found it! 🎯</div>
          <div class="result-sub">You identified the impostor in ${attemptsUsed} attempt${attemptsUsed!==1?'s':''}.</div>
        </div>`;
    } else {
      resultHTML = `
        <div class="result-banner lose">
          <div class="result-title">Out of guesses</div>
          <div class="result-sub">The impostor was clue ${order.indexOf(impostorIdx)+1}. Better luck next time.</div>
        </div>`;
    }
  }

  // Action button
  let actionHTML = '';
  if (!done) {
    const disabled = selectedIdx === null ? 'disabled' : '';
    actionHTML = `<button class="btn guess-btn" ${disabled} onclick="submitGuess()">
      ${selectedIdx !== null ? `Accuse Clue ${selectedIdx+1}` : 'Select a clue'}
    </button>`;
  } else {
    actionHTML = `<button class="btn btn-primary" onclick="startGame()">Play Again (reshuffled)</button>`;
  }

  el.innerHTML = `
    <div class="puzzle-header">
      <div class="section-label">Theme</div>
      <div class="puzzle-theme">${theme}</div>
      ${desc ? `<div class="puzzle-desc">${desc}</div>` : ''}
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <div style="font-size:10px;color:var(--muted);letter-spacing:0.1em;">ATTEMPTS LEFT</div>
      <div class="attempts-bar">${pips}</div>
    </div>
    ${resultHTML}
    <div class="clues-grid">${cards}</div>
    ${actionHTML}
  `;
}

function selectClue(dispIdx) {
  if (gameState.done) return;
  gameState.selectedIdx = gameState.selectedIdx === dispIdx ? null : dispIdx;
  renderPlay();
}

function submitGuess() {
  if (gameState.selectedIdx === null || gameState.done) return;
  const { selectedIdx, order } = gameState;
  const guessedOrigIdx = order[selectedIdx];
  const correct = guessedOrigIdx === puzzle.impostorIdx;

  if (correct) {
    gameState.done = true;
    gameState.won = true;
  } else {
    gameState.attemptsLeft--;
    // Flash wrong
    const cards = document.querySelectorAll('.clue-card');
    if (cards[selectedIdx]) {
      cards[selectedIdx].classList.add('wrong');
      setTimeout(() => cards[selectedIdx].classList.remove('wrong'), 500);
    }
    showToast('Wrong! Try again.');
    gameState.selectedIdx = null;
    if (gameState.attemptsLeft <= 0) {
      gameState.done = true;
      gameState.won = false;
    }
  }

  setTimeout(() => renderPlay(), correct || gameState.attemptsLeft <= 0 ? 300 : 150);
}

// ══════════════════════════════════════
//  TOAST
// ══════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
